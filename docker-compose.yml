version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory_postgres
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  productservice:
    build:
      context: ./backend/ProductService
      dockerfile: Dockerfile
    container_name: inventory_productservice
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=inventory_db;Username=inventory_user;Password=inventory_pass;Search Path=product_schema"
    depends_on:
      postgres:
        condition: service_healthy

  transactionservice:
    build:
      context: ./backend/TransactionService
      dockerfile: Dockerfile
    container_name: inventory_transactionservice
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=inventory_db;Username=inventory_user;Password=inventory_pass;Search Path=transaction_schema"
      ProductServiceBaseUrl: "http://productservice:8080"
    depends_on:
      postgres:
        condition: service_healthy
      productservice:
        condition: service_started

volumes:
  postgres_data:
